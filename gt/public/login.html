<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Travel Explorer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 500px;
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }
    .header {
      background-color: #4a6fa5;
      color: white;
      padding: 25px;
      text-align: center;
    }
    .form-container {
      padding: 30px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #4a6fa5;
      box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.2);
    }
    .btn {
      width: 100%;
      padding: 14px;
      background-color: #4a6fa5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn:hover {
      background-color: #3a5a80;
    }
    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }
    .error {
      background-color: rgba(231, 76, 60, 0.1);
      color: #e74c3c;
      border: 1px solid rgba(231, 76, 60, 0.3);
    }
    .success {
      background-color: rgba(46, 204, 113, 0.1);
      color: #2ecc71;
      border: 1px solid rgba(46, 204, 113, 0.3);
    }
    .form-footer {
      text-align: center;
      margin-top: 25px;
      font-size: 15px;
    }
    .form-footer a {
      color: #4a6fa5;
      text-decoration: none;
      font-weight: 500;
    }
    .form-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Welcome Back</h1>
      <p>Sign in to your account</p>
    </div>

    <div class="form-container">
      <div class="message error" id="login-error"></div>
      <div class="message success" id="login-success"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" name="email" placeholder="Enter your email" required />
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" placeholder="Enter your password" required />
        </div>

        <button type="submit" class="btn">Login</button>
      </form>

      <div class="form-footer">
        Don’t have an account? <a href="sign.html">Create Account</a>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "http://localhost:5000/api/auth/login";
    const errorBox = document.getElementById("login-error");
    const successBox = document.getElementById("login-success");

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";
      successBox.style.display = "none";

      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value.trim();

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
          credentials: "include",
        });

        const data = await response.json();

        if (response.ok && data.success) {
          successBox.style.display = "block";
          successBox.textContent = "✅ Login successful! Redirecting...";
          setTimeout(() => (window.location.href = "front.html"), 1500);
        } else {
          errorBox.style.display = "block";
          errorBox.textContent = data.message || "Invalid email or password.";
        }
      } catch (err) {
        errorBox.style.display = "block";
        errorBox.textContent = "⚠️ Server not reachable. Make sure backend is running.";
      }
    });
  </script>
</body>
</html>
