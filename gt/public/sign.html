<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - Travel Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .container { width: 100%; max-width: 500px; background-color: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); overflow: hidden; }
    .header { background-color: #4a6fa5; color: white; padding: 25px; text-align: center; }
    .form-container { padding: 30px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; color: #333; }
    input { width: 100%; padding: 14px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 18px; transition: all 0.3s; }
    input:focus { border-color: #4a6fa5; box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.2); outline: none; }
    .btn { width: 100%; padding: 14px; background-color: #4a6fa5; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .btn:hover { background-color: #3a5a80; }
    .message { padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; display: none; }
    .error { background-color: rgba(231, 76, 60, 0.1); color: #e74c3c; border: 1px solid rgba(231, 76, 60, 0.3); }
    .success { background-color: rgba(46, 204, 113, 0.1); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.3); }
    .form-footer { text-align: center; margin-top: 25px; font-size: 15px; }
    .form-footer a { color: #4a6fa5; text-decoration: none; font-weight: 500; }
    .form-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Create Account</h1>
      <p>Join Travel Explorer today</p>
    </div>

    <div class="form-container">
      <div class="message error" id="signup-error"></div>
      <div class="message success" id="signup-success"></div>

      <form id="signupForm">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required />

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required />

        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required />

        <button type="submit" class="btn">Create Account</button>
      </form>

      <div class="form-footer">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "http://localhost:5000/api/auth/register";
    const errorBox = document.getElementById("signup-error");
    const successBox = document.getElementById("signup-success");

    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";
      successBox.style.display = "none";

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();

      if (password !== confirmPassword) {
        errorBox.style.display = "block";
        errorBox.textContent = "❌ Passwords do not match.";
        return;
      }

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password }),
          credentials: "include",
        });

        const data = await response.json();

        if (response.ok && data.success) {
          successBox.style.display = "block";
          successBox.textContent = "✅ Registration successful! Redirecting to login...";
          setTimeout(() => (window.location.href = "login.html"), 1500);
        } else {
          errorBox.style.display = "block";
          errorBox.textContent = data.message || "Registration failed. Try again.";
        }
      } catch (err) {
        errorBox.style.display = "block";
        errorBox.textContent = "⚠️ Server not reachable. Make sure backend is running.";
      }
    });
  </script>
</body>
</html>
