<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background-image: url('https://cdn.pixabay.com/photo/2022/08/08/19/36/landscape-7373484_1280.jpg');
      background-repeat: no-repeat;
      background-size: cover;
    }

    h1 {
      color: #333;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logout-button {
      padding: 8px 16px;
      background-color: #dc3545;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    .feedback-button{
      padding: 8px 16px;
      background-color: #dc3545;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    .logout-button:hover {
      background-color: #c82333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 12px;
      text-align: left;
    }

    th {
      background-color: #f2f2f2;
    }

    #error {
      color: red;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <h1>Welcome Admin</h1>
    <button class="logout-button" onclick="logout()">Logout</button>
    <a href="/admin/feedback" class="feedback-button">View Feedback</a>
  </div>

  <h2>Logged-in Users</h2>

  <table>
    <thead>
      <tr>
        <th>Full Name</th>
        <th>Email</th>
        <th>Last Login</th>
      </tr>
    </thead>
    <tbody id="usersTable">
      <!-- Data will be inserted here -->
    </tbody>
  </table>
  
  <div id="error"></div>

  <script>
    // Load user data
    fetch('/admin/users')
      .then(res => {
        if (!res.ok) throw new Error('Access denied or failed to load data');
        return res.json();
      })
      .then(users => {
        const table = document.getElementById('usersTable');
        users.forEach(user => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${user.fullName}</td>
            <td>${user.email}</td>
            <td>${user.loginTime ? new Date(user.loginTime).toLocaleString() : 'N/A'}</td>
          `;
          table.appendChild(row);
        });
      })
      .catch(err => {
        document.getElementById('error').textContent = err.message;
      });

    // Logout function
    function logout() {
      fetch('/logout', { method: 'POST' })
        .then(() => {
          window.location.href = '/login';
        });
    }
  </script>
  <script>
  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await fetch("/logout", { method: "POST" });
    window.location.href = "/login";
  });
</script>

</body>
</html>
